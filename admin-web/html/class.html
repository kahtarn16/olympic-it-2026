<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quản lý Lớp</title>

    <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>

<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🏫 Quản lý Lớp</h2>
        <a href="admin.html" class="btn btn-secondary">
            Quay lại
        </a>
    </div>
    <div class="card shadow p-4 mb-4">
        <h5 class="mb-3">
            Thêm lớp
        </h5>
        <div class="row g-2">
            <div class="col-md-5">
                <input 
                    id="className"
                    class="form-control"
                    placeholder="Tên lớp">
            </div>
            <div class="col-md-5">
                <select 
                    id="academicYear"
                    class="form-select">
                </select>
            </div>
            <div class="col-md-2">
                <button 
                    id="btnAdd"
                    class="btn btn-primary w-100">
                    Thêm
                </button>
            </div>
        </div>
    </div>
    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered text-center">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Tên lớp</th>
                        <th>Khóa</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="classTable">
                </tbody>
            </table>
        </div>
    </div>
</div>
<script type="module" src="../js/classes.js"></script>
</body>
</html>
