<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Phòng thi</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        .bg-purple {
            background-color: #6f42c1 !important;
            color: #fff;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-4">

        <h3 id="examName">Phòng thi</h3>

        <div class="mb-3">

            <span class="badge bg-secondary" id="roomState">
                WAITING
            </span>

        </div>

        <div class="card mb-3">

            <div class="card-header">
                Thí sinh đã tham gia
            </div>

            <div class="card-body">

                <h5>
                    <span id="joinedCount">0/0</span>
                </h5>

                <ul class="list-group" id="participantList">

                </ul>

            </div>

        </div>

        <div class="card mb-3">

            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Nhật ký vi phạm quy chế thi</span>
                <span class="badge bg-danger" id="bannedCount">0 bị cấm</span>
            </div>

            <div class="card-body">

                <ul class="list-group" id="antiCheatList" style="max-height: 300px; overflow-y: auto;">
                    <li class="list-group-item text-muted small">Đang tải...</li>
                </ul>

            </div>

        </div>

        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Danh sách thí sinh nộp câu trả lời</span>
                <span class="badge bg-primary" id="submittedCount">0</span>
            </div>
            <div class="card-body">
                <ul class="list-group" id="submittedList" style="max-height: 250px; overflow-y: auto;">
                    <li class="list-group-item text-muted small">Chưa có ai nộp bài.</li>
                </ul>
            </div>
        </div>

        <div class="card">

            <div class="card-header">
                Nội dung
            </div>

            <div class="card-body" id="contentArea">

                <p class="text-muted">Đang tải trạng thái phòng thi...</p>

            </div>

        </div>

        <div class="mt-3">

            <button id="btnStart" class="btn btn-success" disabled>

                Bắt đầu

            </button>

            <button id="btnNext" class="btn btn-primary" disabled>

                Câu tiếp theo

            </button>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script type="module" src="../js/exam_room.js"></script>

</body>

</html>
