<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympic IT - Admin</title>

    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <div class="container vh-100 d-flex justify-content-center align-items-center">

        <div class="card shadow p-4" style="width: 400px;">

            <div class="text-center mb-4">

                <img src="../js/core/img/logo_caothang.webp" alt="Logo Cao Thắng" class="login-logo mb-3">

                <h3>Olympic IT</h3>

                <p class="text-muted">
                    Đăng nhập quản trị
                </p>

            </div>

            <form id="loginForm">

                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control" id="username" placeholder="Nhập username">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="password" placeholder="Nhập password">
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary" id="btnLogin">
                        Đăng nhập
                    </button>
                </div>

            </form>

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/login.js"></script>
</body>

</html>
