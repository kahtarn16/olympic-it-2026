name: olympic_it_project
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  file_picker: ^12.0.0-beta.7  # Để chọn tệp chung
  image_picker: ^1.0.7 # Để chuyên chọn ảnh/video
  video_player: ^2.8.2
  chewie: ^1.8.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^10.3.1
