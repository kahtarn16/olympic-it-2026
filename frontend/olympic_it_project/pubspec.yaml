name: olympic_it_project
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^6.1.1
  image_picker: ^1.0.7
  video_player: ^2.8.2
  chewie: ^1.8.5
  flutter_bloc: ^8.1.3
  flutter_secure_storage: ^9.0.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_windowmanager_v2: ^0.0.1
  root_checker_plus: any
  package_info_plus: any
  wakelock_plus: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/