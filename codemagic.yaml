workflows:
  ios-workflow:
    name: iOS Flutter Build

    max_build_duration: 60
    instance_type: mac_mini_m1

    working_directory: olympic_it_project

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter version
        script: flutter --version

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
