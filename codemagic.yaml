workflows:
  ios-workflow:
    name: iOS Flutter Build

    instance_type: mac_mini_m1
    max_build_duration: 60

    working_directory: frontend/olympic_it_project

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Check Environment
        script: |
          pwd
          ls -la
          flutter --version

      - name: Check Flutter Project
        script: |
          if [ ! -f pubspec.yaml ]; then
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi

      - name: Get Packages
        script: flutter pub get

      - name: Build IPA
        script: flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa