workflows:
  ios-workflow:
    name: iOS Flutter Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    working_directory: olympic_it_project
    environment:
      flutter: master
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          # 🛠️ MẸO: Tự động tìm và thay thế tất cả khoảng trắng lỗi (NBSP) thành khoảng trắng chuẩn bằng lệnh sed
          sed -i '' 's/ / /g' pubspec.yaml
          
          # Tiến hành lấy package như bình thường
          flutter pub get
      - name: Build Flutter iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app