scripts:
  - name: Debug Environment
    script: |
      set -ex

      echo "===== CURRENT DIRECTORY ====="
      pwd

      echo "===== FILES ====="
      ls -R

      echo "===== WHO AM I ====="
      whoami || true

      echo "===== PATH ====="
      echo $PATH

      echo "===== WHICH FLUTTER ====="
      which flutter || true

      echo "===== FLUTTER VERSION ====="
      flutter --version || true

      echo "===== DART VERSION ====="
      dart --version || true

      echo "===== FLUTTER DOCTOR ====="
      flutter doctor -v || true

  - name: Pub Get
    script: |
      set -ex
      flutter pub get --verbose